services:
  db:
    image: postgres:16
    container_name: pokemon-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pokedb
      POSTGRES_PASSWORD: AI_Th0ught_L3ad3r
      POSTGRES_DB: pokedb
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pokemon.csv:/docker-entrypoint-initdb.d/pokemon.csv

  mcp-pokeapi:
    build: ./mcp_pokeapi
    container_name: mcp-pokeapi
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Auf macOS mit Metal (Apple Silicon) reicht der Eintrag oben;
    # für NVIDIA-GPU unter Linux deployment/resources.reservations.devices ergänzen

  webapp:
    build: ./webapp
    container_name: pokepilot-web
    ports:
      - "8000:8000"
    environment:
      MODEL: llama3.2:3b
      DB_DSN: "host=db port=5432 dbname=pokedb user=pokedb password=AI_Th0ught_L3ad3r"
      OLLAMA_URL: "http://ollama:11434/v1/chat/completions"
    depends_on:
      - db
      - ollama
      - mcp-pokeapi

volumes:
  ollama_data:
