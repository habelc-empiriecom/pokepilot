services:
  db:
    image: postgres:16
    container_name: pokemon-db
    environment:
      POSTGRES_USER: pokedb
      POSTGRES_PASSWORD: AI_Th0ught_L3ad3r
      POSTGRES_DB: pokedb
    network_mode: host
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pokemon.csv:/docker-entrypoint-initdb.d/pokemon.csv

  mcp-pokeapi:
    build: ./mcp_pokeapi
    container_name: mcp-pokeapi
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Auf macOS mit Metal (Apple Silicon) reicht der Eintrag oben;
    # für NVIDIA-GPU unter Linux deployment/resources.reservations.devices ergänzen

  webapp:
    build: ./webapp
    container_name: pokepilot-web
    network_mode: host
    environment:
      MODEL: phi3.5:3.8b
    depends_on:
      - db
      - ollama
      - mcp-pokeapi

volumes:
  ollama_data:
